{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tienda de Videojuegos{% endblock %}</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- SCRIPTS -->
    <script src="{% static 'js/script.js' %}"></script>
</head>

<body class="bg-dark text-ligth ">

    {% block content %}
    <!-- Aqui ira el contenido especifico de cada pagina -->
    {% endblock %}

    <footer class="text-center mt-5 mb-3">
        <p class="text-light">@ 2026 Tienda de Videojuegos</p>
        <a href="{% url 'home' %}" class="text-light">Inicio</a>
        <a href="{% url 'contacto' %}" class="text-light ms-3">Contacto</a>

    </footer>

</body>

</html>
