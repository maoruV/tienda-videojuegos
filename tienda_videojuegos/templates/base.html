{% load static %}

<!DOCTYPE html>
<html lang="es" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tienda de Videojuegos{% endblock %}</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.2.0/css/all.min.css" rel="stylesheet"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- SCRIPTS -->
    <script src="{% static 'js/script.js' %}"></script>
</head>

<body class="bg-body text-body">

    <!-- cabecera con boton de cambio de tema -->
    <header class="d-flex justify-content-between aling-items-center p-3 border-bottom">
        <button id="toggle-theme"
            class="btn btn-outline-secondary rounded-circle shadow-sm d-flex aling-items-center justify-content-center"
            style="width: 45px; height: 45px; transition: all 0.3s ease;">
            <i class="bi bi-circle-half"></i>
        </button>

    </header>

    {% block content %}
    <!-- Aqui ira el contenido especifico de cada pagina -->
    {% endblock %}

    <footer class="text-center mt-5 mb-3">
        <p class="text-body">@ 2026 Tienda de Videojuegos</p>
        <a href="{% url 'home' %}" class="text-body">Inicio</a>
        <a href="{% url 'contacto' %}" class="text-body ms-3">Contacto</a>

    </footer>

</body>

</html>
