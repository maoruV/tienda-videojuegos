{% load static %}
{% if resultados %}
<div class="dropdown-menu show w-100 shadow border" style="max-height: 400px; overflow-y: auto;">
    {% for juego in resultados %}
    <a href="{% url 'catalogo:detalle_juego' juego.id %}" class="dropdown-item py-2 border-bottom">
        <div class="d-flex align-items-center">
            <img src="{% static 'img/portadas/'|add:juego.imagen %}" alt="{{ juego.nombre }}" class="me-3 rounded"
                style="width: 50px; height: 50px; object-fit: cover;">
            <div class="flex-grow-1">
                <div class="fw-semibold text-truncate">{{ juego.nombre }}</div>
                <small class="text-muted">{{ juego.plataforma }}</small>
            </div>
            <div class="text-danger fw-bold">${{ juego.precio }}</div>
        </div>
    </a>
    {% endfor %}
</div>
{% endif %}
